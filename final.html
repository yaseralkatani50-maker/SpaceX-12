<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A4 HTML Viewer – Server Version</title>

<style>
body {
  font-family: 'Times New Roman', serif;
  margin: 0;
  padding: 20px;
  background: #e5e5e5;
}

.container {
  max-width: 900px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 160px;
  padding: 10px;
  font-family: monospace;
  font-size: 14px;
  border: 1px solid #999;
}

button {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

/* Kertas A4 */
.output {
  margin-top: 25px;
  background: white;
  padding: 40px;
  width: 793px;
  min-height: 1122px;
  border: 1px solid black;
  margin-left: auto;
  margin-right: auto;
  box-shadow: 0 0 10px rgba(0,0,0,0.25);
  box-sizing: border-box;
}

.output * {
  font-family: 'Times New Roman', serif !important;
}
</style>
</head>
<body>

<div class="container">
  <h2>A4 Editor — Sinkron Antar Device</h2>

  <textarea id="input" placeholder="Tempel HTML di sini..."></textarea><br>

  <button onclick="saveToServer()">Simpan ke Server</button>
  <button onclick="copyResult()">Salin Hasil</button>

  <div id="output" class="output"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ====== MASUKKAN DATA FIREBASE KAMU DI SINI ======
const firebaseConfig = {
  apiKey: "ISI_DI_SINI",
  authDomain: "ISI_DI_SINI.firebaseapp.com",
  databaseURL: "https://ISI_DI_SINI.firebaseio.com",
  projectId: "ISI_DI_SINI",
  storageBucket: "ISI_DI_SINI.appspot.com",
  messagingSenderId: "ISI_DI_SINI",
  appId: "ISI_DI_SINI"
};
// =================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* Simpan HTML ke server */
function saveToServer() {
  const html = document.getElementById('input').value;

  db.ref("dokumenA4").set({
    content: html
  });

  alert("Berhasil disimpan! Device lain bisa melihat hasilnya.");
}

/* Load otomatis agar device lain bisa lihat */
db.ref("dokumenA4").on("value", (snapshot) => {
  const data = snapshot.val();
  if (data && data.content) {
    document.getElementById('output').innerHTML = data.content;
  }
});

/* Copy untuk Word */
function copyResult() {
  const output = document.getElementById('output');
  const range = document.createRange();
  range.selectNode(output);

  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  document.execCommand("copy");
  selection.removeAllRanges();

  alert("Berhasil disalin! Paste ke Word 100% sama.");
}
</script>

</body>
</html>
